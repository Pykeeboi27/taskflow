name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Stage 1: Secrets Detection ───────────────────────────────────────────────

  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Stage 2: Security Scan ───────────────────────────────────────────────────

  trivy-scan:
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # Scan the entire repository (filesystem scan)
          scan-type: 'fs'
          scan-ref: '.'
          # Exit with error code if vulnerabilities are found
          exit-code: '1'
          # Only fail on HIGH and CRITICAL vulnerabilities (ignore LOW/MEDIUM)
          severity: 'HIGH,CRITICAL'
          # Output format (you can also use json, sarif, table, etc.)
          format: 'table'

      # - name: Upload Trivy results to GitHub Security
      #   uses: github/codeql-action/upload-sarif@v2
      #   if: always()  # Run even if Trivy scan fails
      #   with:
      #     sarif_file: 'trivy-results.sarif'

  # ─── Stage 3: Lint + Format + Test (parallel) ─────────────────────────────────

  backend-ci:
    name: Backend CI
    needs: [trivy-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskflow-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            taskflow-backend/requirements.txt
            taskflow-backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Ruff
        run: pip install ruff==0.6.0

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Install pytest-cov
        run: pip install pytest-cov

      - name: Run tests
        run: pytest --cov=app --cov-report=term --cov-fail-under=80

  frontend-ci:
    name: Frontend CI
    needs: [trivy-scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskflow-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: taskflow-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,scss,md}"

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

  # ─── Stage 4: Build ───────────────────────────────────────────────────────────

  build:
    name: Build
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t taskflow-backend:${{ github.sha }} ./taskflow-backend

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: taskflow-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: taskflow-frontend

      - name: Build frontend
        run: npm run build
        working-directory: taskflow-frontend
