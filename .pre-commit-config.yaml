exclude: '^(?:\.venv|venv)/'
repos:
  # 1. Basic File Hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^helm\/.*$'
      - id: check-added-large-files
      - id: check-json

  # 2. Python - Ruff (Linting & Formatting Checks)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        name: Ruff Check
        files: ^taskflow-backend/(app|tests)/.*\.py$
      - id: ruff-format
        name: Ruff Format
        files: ^taskflow-backend/(app|tests)/.*\.py$

  # 3. Prettier (Code Formatting - TS/JS)
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        language: system
        entry: npx --no-install --prefix ./taskflow-frontend prettier --write
        files: ^taskflow-frontend/.*\.(js|jsx|ts|tsx|json|css|scss|md)$
        types: [file]

  # 4. ESLint (Linting - TS/JS)
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        entry: npm --prefix ./taskflow-frontend run lint -- --fix src
        files: ^taskflow-frontend/.*\.[jt]sx?$
        types: [file]
        pass_filenames: false

  # 5. Gitleaks (Secrets Detection)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  # 6. Backend Unit Tests
  - repo: local
    hooks:
      - id: backend-test
        name: Backend Test - pytest
        entry: python
        args:
          - -m
          - pytest
          - taskflow-backend/tests
          - -v
          - --rootdir=taskflow-backend
          - --cov=app
          - --cov-report=term
          - --cov-fail-under=80
        language: system
        files: ^taskflow-backend/(app|tests)/
        pass_filenames: false
        stages: [pre-push]
        verbose: true

  # 7. Trivy (Dependency Scan)
  - repo: local
    hooks:
      - id: trivy
        name: Trivy Security Scan
        language: system
        entry: trivy
        stages: [pre-push]
        args:
          [
            "--timeout",
            "30m",
            "fs",
            ".",
            "--severity",
            "HIGH,CRITICAL",
            "--exit-code",
            "1",
            "--scanners",
            "vuln,misconfig",
            "--skip-dirs",
            "taskflow-frontend/.next",
          ]
        pass_filenames: false

  # 8. Frontend Build
  - repo: local
    hooks:
      - id: frontend-build
        name: Frontend Build
        entry: npm --prefix ./taskflow-frontend run build
        language: system
        files: ^taskflow-frontend/
        pass_filenames: false
        stages: [pre-push]
        verbose: true
